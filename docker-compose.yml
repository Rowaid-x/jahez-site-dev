version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: jahez_db
      POSTGRES_USER: jahez_user
      POSTGRES_PASSWORD: jahez_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: ./backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn jahez.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - static_files:/app/staticfiles
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-key-change-me-in-prod}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-manage.jahez.qa,dev.jahez-qa.site,jahez-qa.site,localhost,127.0.0.1}
      - DB_NAME=jahez_db
      - DB_USER=jahez_user
      - DB_PASSWORD=jahez_pass
      - DB_HOST=db
      - DB_PORT=5432
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://manage.jahez.qa,https://dev.jahez-qa.site,https://jahez-qa.site}
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    volumes:
      - frontend_build:/usr/share/nginx/html

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
      - frontend_build:/usr/share/nginx/html
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - web
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  static_files:
  frontend_build:
  certbot_www:
  certbot_conf:
