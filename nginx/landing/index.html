<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Homepage</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #0b1220; color: #e6edf3; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 48px 20px; }
      .card { width: 100%; max-width: 720px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 28px; }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 0 0 18px; line-height: 1.6; color: rgba(230,237,243,0.85); }
      a { color: #7ee787; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .badge { display: inline-block; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 10px; border-radius: 999px; background: rgba(126,231,135,0.12); border: 1px solid rgba(126,231,135,0.28); margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="badge">Landing</div>
        <h1>Welcome</h1>
        <p>This is the main site landing page.</p>
        <p>
          Development dashboard:
          <a href="https://dev.jahez-qa.site">dev.jahez-qa.site</a>
        </p>
      </div>
    </div>
  </body>
</html>
