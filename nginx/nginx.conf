upstream backend {
    server web:8000;
}

# --- dev.jahez-qa.site: HTTP -> HTTPS redirect + certbot challenge ---
server {
    listen 80;
    server_name dev.jahez-qa.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- dev.jahez-qa.site: HTTPS (app) ---
server {
    listen 443 ssl;
    server_name dev.jahez-qa.site;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/dev.jahez-qa.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.jahez-qa.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # API requests -> Django
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Frontend (React SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# --- jahez-qa.site: HTTP -> HTTPS redirect + certbot challenge ---
server {
    listen 80;
    server_name jahez-qa.site www.jahez-qa.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- jahez-qa.site: HTTPS (landing page) ---
server {
    listen 443 ssl;
    server_name jahez-qa.site www.jahez-qa.site;

    ssl_certificate /etc/letsencrypt/live/jahez-qa.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jahez-qa.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        root /var/www/landing;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

# --- Catch-all: redirect IP/unknown hosts ---
server {
    listen 80 default_server;
    server_name 72.62.74.227 _;

    return 301 https://jahez-qa.site$request_uri;
}
